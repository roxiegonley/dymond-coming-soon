<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dymond Concentrates — Coming Soon</title>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@300;400;600&family=Inter:wght@300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background-color: #000000;
      color: #c0c0c0;
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
      overflow: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: 
        linear-gradient(45deg, #1a1a1a 25%, transparent 25%),
        linear-gradient(-45deg, #1a1a1a 25%, transparent 25%),
        linear-gradient(45deg, transparent 75%, #1a1a1a 75%),
        linear-gradient(-45deg, transparent 75%, #1a1a1a 75%);
      background-size: 60px 60px;
      background-position: 0 0, 0 30px, 30px -30px, -30px 0px;
      opacity: 0.15;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      max-width: 600px;
    }

    .logo {
      width: 320px;
      max-width: 80vw;
      margin-bottom: 3rem;
      filter: drop-shadow(0 0 20px rgba(180,180,180,0.15));
    }

    .divider {
      width: 60px;
      height: 1px;
      background: linear-gradient(90deg, transparent, #888, transparent);
      margin: 0 auto 2.5rem;
    }

    h1 {
      font-family: 'Rajdhani', sans-serif;
      font-weight: 300;
      font-size: clamp(1.6rem, 4vw, 2.2rem);
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: #e0e0e0;
      margin-bottom: 1.25rem;
    }

    p {
      font-weight: 300;
      font-size: 0.95rem;
      line-height: 1.8;
      color: #888;
      letter-spacing: 0.04em;
    }

    .divider-bottom {
      width: 60px;
      height: 1px;
      background: linear-gradient(90deg, transparent, #555, transparent);
      margin: 2.5rem auto 0;
    }
  </style>
</head>
